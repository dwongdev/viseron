parameters:
  - name: noCache
    displayName: "Build without cache"
    type: boolean
    default: false

trigger: none
pr: none

pool:
  vmImage: "ubuntu-latest"

resources:
  pipelines:
    - pipeline: viseronFFmpeg
      source: "Viseron FFmpeg"
      trigger:
        branches:
          - dev

stages:
  - stage: OpenCV
    jobs:
      - template: templates/build.yaml
        parameters:
          image: opencv
          noCache: ${{ parameters.noCache }}
